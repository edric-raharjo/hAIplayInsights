<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Tree Demo</title>
    <style>
        .tree-layout { display: flex; gap: 2rem; flex-wrap: wrap; }
        .tree-left-panel { flex: 1; min-width: 350px; display: flex; flex-direction: column; gap: 1rem; }
        .tree-right-panel { flex: 2; min-width: 500px; background: white; border: 1px solid #e5e7eb; border-radius: 8px; overflow-x: auto; padding: 1.5rem; position: relative; }
        .tree-error-box { background: #fef2f2; border: 1px solid #ef4444; color: #b91c1c; padding: 1rem; border-radius: 6px; display: none; font-weight: bold; }
        .tree-table-container { max-height: 250px; overflow-y: auto; border: 1px solid #e5e7eb; }
        .tree-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .tree-table th, .tree-table td { padding: 0.5rem; border-bottom: 1px solid #e5e7eb; text-align: center; }
        .tree-table th { background: #f9fafb; position: sticky; top: 0; }
        
        .tree-controls { background: #f9fafb; padding: 1rem; border-radius: 8px; border: 1px solid #e5e7eb; }
        .feature-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px dashed #d1d5db; }
        .feature-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .feature-calc-btn { background: #2563eb; color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; }
        .feature-calc-btn:hover { background: #1d4ed8; }
        .feature-split-btn { background: #10b981; color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; display: none; }
        .feature-split-btn:hover { background: #059669; }
        
        .node-circle { cursor: pointer; fill: white; stroke: #2563eb; stroke-width: 2; transition: all 0.2s; }
        .node-circle.active { fill: #EFF6FF; stroke: #1D4ED8; stroke-width: 4; }
        .node-text { font-size: 12px; font-family: sans-serif; pointer-events: none; }
        .node-label { font-size: 14px; font-weight: bold; fill: #1f2937; }
        
        .ideal-tree-btn { margin-top: 1rem; width: 100%; background: #8b5cf6; color: white; padding: 0.75rem; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .ideal-tree-btn:hover { background: #7c3aed; }
        .reset-tree-btn { margin-top: 0.5rem; width: 100%; background: #f3f4f6; color: #374151; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .reset-tree-btn:hover { background: #e5e7eb; }
    </style>
</head>
<body>
    <div class="container demo-section">
        <h1>Decision Tree with Gini Impurity</h1>
        <p>Learn how decision trees use Gini impurity to find the best feature to split on.</p>
        
        <div class="tree-layout">
            <div class="tree-left-panel">
                <div id="treeErrorBox" class="tree-error-box"></div>
                
                <div style="background: white; padding: 1rem; border: 1px solid #e5e7eb; border-radius: 8px;">
                    <h3>Current Node Data (<span id="treeNodeSamplesCount">0</span> samples)</h3>
                    <p style="font-size: 0.9rem; color: #4b5563; margin-bottom: 0.5rem;">Target Gini Impurity: <strong id="treeTargetGini">0.00</strong></p>
                    <div class="tree-table-container">
                        <table class="tree-table">
                            <thead>
                                <tr>
                                    <th>Age</th>
                                    <th>Income</th>
                                    <th>Emp. Yrs</th>
                                    <th>Target (Approved)</th>
                                </tr>
                            </thead>
                            <tbody id="treeTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="tree-controls" id="treeControlsArea">
                    <h3 style="margin-bottom: 1rem;">Evaluate Splits</h3>
                    <div id="treeFeaturesContainer">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div>
                    <button id="btnIdealTree" class="ideal-tree-btn">? Instantly Show Ideal Tree</button>
                    <button id="btnResetTree" class="reset-tree-btn">? Reset Tree</button>
                </div>
            </div>
            
            <div class="tree-right-panel" id="treeRightPanel">
                <svg id="treeCanvas" width="1000" height="600" style="min-width: 1000px; display: block;"></svg>
            </div>
        </div>
    </div>
</body>
</html>
